<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitman Food Delivery App</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background-image:url('food-bg.jpg');
    background-size:cover;
    background-position:center;
}

header{
    background:#ff6600;
    color:white;
    text-align:center;
    padding:20px;
}

#menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.food-item{
    background:white;
    width:250px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px gray;
}

.food-item img{
    width:100%;
    height:150px;
    border-radius:10px;
}

.food-item button{
    background:green;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

.food-item button:hover{
    background:darkgreen;
}

#cart{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
}
</style>

</head>
<body>

<header>
    <h1>🍴 Hitman Food Delivery App</h1>

    <div style="margin-top:15px;">

        <a href="order.html">
            <button style="background:#28a745;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;">
                🛒 Order
            </button>
        </a>

        <a href="contact.html">
            <button style="background:#007bff;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;">
                📞 Contact Us
            </button>
        </a>

    </div>
</header>

<section id="menu">

<div class="food-item">
   <img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=500" alt="">
    <h3>Chicken Biriyani</h3>
    <p>₹150</p>
    <button onclick="addToCart('Chicken Biriyani',150)">
        Add To Cart
    </button>
</div>

<div class="food-item">
    <img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=500" alt="">
    <h3>Mutton Biriyani</h3>
    <p>₹200</p>
    <button onclick="addToCart('Mutton Biriyani',200)">Add to Cart</button>
</div>

<div class="food-item">
    <img src="https://images.unsplash.com/photo-1516684732162-798a0062be99?w=500" alt="">
    <h3>Curd Rice</h3>
    <p>₹60</p>
    <button onclick="addToCart('Curd Rice',60)">Add to Cart</button>
</div>

<div class="food-item">
   <img src="https://images.unsplash.com/photo-1512058564366-18510be2db19?w=500" alt="">
    <h3>Lemon Rice</h3>
    <p>₹80</p>
    <button onclick="addToCart('Lemon Rice',80)">Add to Cart</button>
</div>

<div class="food-item">
    <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=500" alt="">
    <h3>Chicken Rice</h3>
    <p>₹120</p>
    <button onclick="addToCart('Chicken Rice',120)">Add to Cart</button>
</div>

<div class="food-item">
    <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=500" alt="">
    <h3>Egg Rice</h3>
    <p>₹100</p>
    <button onclick="addToCart('Egg Rice',100)">Add to Cart</button>
</div>

</section>

<div id="cart">
    <h2>🛒 Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>

    <br><br>

    <a href="order.html">
        <button style="background:#ff6600;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;">
            Proceed To Order
        </button>
    </a>
</div>

<script>
let total=0;

function addToCart(item,price){
    let cart=document.getElementById("cart-items");

    let li=document.createElement("li");
    li.innerHTML=item+" - ₹"+price;

    cart.appendChild(li);

    total+=price;
    document.getElementById("total").innerText=total;
}
</script>

</body>
</html>
